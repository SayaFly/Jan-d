{% extends "base.html" %} 
{% block body %}
<div id="photos" class="page-photos animate__animated animate__fadeIn" style="display: flex;">
   <div class="d-flex" justifycontent="center" alignitems="center" width="100">
      <div class="d-flex" flexdirection="column" style="width: 1245px;">
         <div class="page-header d-flex" alignitems="center">
            <div class="page-icon d-flex" justifycontent="center" alignitems="center">
               <i class="icon --camera"></i>
            </div>
            <div class="d-flex" flexdirection="column">
               <span class="page-title" weight="500">{{locale.photos_by}} {{site.shortname}}'s</span>
               <p class="page-description">{{locale.photos_desc}} {{site.shortname}}'s.</p>
            </div>
         </div>
         <div class="d-none">
            <input id="photoCount" value="16">
            <input id="loadCount" value="8">
         </div>
         <div id="photoGet">
            <div class="photos-content d-flex" flexwrap="wrap">
               {% for photo in data %}
               <a class="photo-item" overflow="hidden" position="relative" style="background-image: url({{photo.url}});">
                  <div class="user-info d-flex" alignitems="center" position="absolute" width="100">
                     <div class="figure" position="absolute" style="background-image: url({{site.fpath}}?figure={{photo.figure}}&amp;direction=2&amp;head_direction=3&amp;gesture=sml);"></div>
                     <span class="username" weight="500">{{photo.author}}</span>
                  </div>
               </a>
               {% endfor %}
            </div>
         </div>
      </div>
   </div>
</div>
{% endblock %}
